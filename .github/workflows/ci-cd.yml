name: CI and Docker Hub Publish

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_IMAGE: kyliroco/ssda2026

jobs:
  runner-tests:
    name: Runner Tests (Docker Image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build web image for tests
        run: docker build -t web-test:${{ github.sha }} ./web

      - name: Start test container from image
        run: |
          set -euo pipefail
          docker run -d \
            --name web-test \
            -p 6767:6767 \
            -e APP_PORT=6767 \
            -e DATABASE_URL=postgresql://game_user:change_me_now@invalid-host:5432/generate_or_not \
            web-test:${{ github.sha }}

      - name: Check image endpoints
        run: |
          set -euo pipefail

          for _ in {1..30}; do
            if curl -fsS http://localhost:6767/health >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://localhost:6767/ >/dev/null
          health_payload="$(curl -fsS http://localhost:6767/health)"
          echo "$health_payload"
          echo "$health_payload" | grep -q '"app":"up"'

      - name: Show container status
        if: always()
        run: docker ps -a --filter name=web-test

      - name: Show logs on failure
        if: failure()
        run: docker logs web-test

      - name: Cleanup test container
        if: always()
        run: docker rm -f web-test || true

  publish-dockerhub:
    name: Publish Web Image to Docker Hub
    runs-on: ubuntu-latest
    needs: runner-tests
    if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERUSER }}" ] || [ -z "${{ secrets.DOCKERPASS }}" ]; then
            echo "Secrets DOCKERUSER and DOCKERPASS are required."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSER }}
          password: ${{ secrets.DOCKERPASS }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
